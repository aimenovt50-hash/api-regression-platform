name: API Regression CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

env:
  ENV: local
  API_BASE_URL: http://127.0.0.1:8080
  DATABASE_URL: sqlite:///./platform.db

jobs:
  smoke:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt
      - run: pip install -r requirements.txt
      - run: pytest --env=local -m smoke --alluredir=allure-results

  regression:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt
      - run: pip install -r requirements.txt
      - run: pytest --env=local -m "regression or contract or e2e or negative" -n auto --alluredir=allure-results
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results
          path: allure-results
          if-no-files-found: ignore
